; Teensy 4.1 sACN/DMX LED Node
[platformio]
default_envs = teensy41

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
build_src_filter = +<*> -<.git/> -<.svn/>
build_flags =
    -D TEENSY41
    -D LEDS_PER_STRIP=300
    -D NUM_STRIPS=10
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -Wall
    -Wextra
    -I include
lib_deps =
    fastled/FastLED@^3.9.8
    ssilverman/QNEthernet@^0.29.0
    ssilverman/TeensyDMX@^4.2.0
    bblanchon/ArduinoJson@^7.2.0
    greiman/SdFat@^2.2.3
lib_ignore =
    SD
monitor_speed = 115200
upload_protocol = teensy-cli

; Reduced LED count for bench testing without full 3000-LED rig
[env:teensy41_test]
extends = env:teensy41
build_unflags =
    -D LEDS_PER_STRIP=300
build_flags =
    ${env:teensy41.build_flags}
    -D LEDS_PER_STRIP=30
