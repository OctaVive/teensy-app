services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bsp
      POSTGRES_PASSWORD: bsp
      POSTGRES_DB: bsp_infra
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsp -d bsp_infra"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://bsp:bsp@db:5432/bsp_infra
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      LOG_LEVEL: INFO
      RETENTION_DAYS: 365
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
